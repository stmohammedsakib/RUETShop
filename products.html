<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Browse all products on RUET Online Shop — electronics, books, clothing, and more from campus vendors."/>
  <title>Products — RUET Online Shop</title>
  <link rel="icon" href="assets/icons/logo.png" type="image/png"/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/components.css"/>
  <link rel="stylesheet" href="css/navbar.css"/>
  <link rel="stylesheet" href="css/products.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <span class="logo-icon">🛒</span>
        <span class="logo-text">RUET<span class="accent">Shop</span></span>
      </a>
      <div class="nav-search">
        <input type="text" id="globalSearch" placeholder="Search products..." />
        <button id="searchBtn"><i class="fas fa-search"></i></button>
      </div>
      <div class="nav-actions">
        <button class="icon-btn" id="themeToggle"><i class="fas fa-moon"></i></button>
        <a href="cart.html" class="icon-btn cart-btn">
          <i class="fas fa-shopping-cart"></i>
          <span class="badge" id="cartBadge">0</span>
        </a>
        <a href="dashboard.html#wishlist" class="icon-btn">
          <i class="fas fa-heart"></i>
          <span class="badge wish-badge" id="wishBadge">0</span>
        </a>
        <div class="nav-user" id="navUser">
          <a href="auth.html" class="btn btn-primary btn-sm">Login</a>
        </div>
        <button class="hamburger" id="hamburger"><i class="fas fa-bars"></i></button>
      </div>
    </div>
    <div class="mobile-menu" id="mobileMenu">
      <a href="index.html">Home</a>
      <a href="products.html">Products</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="cart.html">Cart</a>
      <a href="auth.html">Login</a>
    </div>
  </nav>

  <div class="page-header">
    <div class="container">
      <h1>All <span class="accent">Products</span></h1>
      <p>Browse our full campus marketplace catalog</p>
    </div>
  </div>

  <div class="products-layout container">

    <!-- SIDEBAR FILTERS -->
    <aside class="filter-sidebar" id="filterSidebar">
      <div class="filter-header">
        <h3>Filters</h3>
        <button class="btn-text" id="clearFilters">Clear All</button>
      </div>

      <div class="filter-group">
        <label class="filter-label">Category</label>
        <div class="filter-options" id="categoryFilters">
          <!-- JS injected -->
        </div>
      </div>

      <div class="filter-group">
        <label class="filter-label">Price Range</label>
        <div class="price-range">
          <input type="range" id="priceRange" min="0" max="5000" value="5000" step="50"/>
          <div class="price-display">
            <span>৳0</span><span id="priceVal">৳5000</span>
          </div>
        </div>
      </div>

      <div class="filter-group">
        <label class="filter-label">Rating</label>
        <div class="filter-options">
          <label class="filter-check"><input type="radio" name="rating" value="4"/> ⭐⭐⭐⭐ & above</label>
          <label class="filter-check"><input type="radio" name="rating" value="3"/> ⭐⭐⭐ & above</label>
          <label class="filter-check"><input type="radio" name="rating" value="0" checked/> All Ratings</label>
        </div>
      </div>

      <div class="filter-group">
        <label class="filter-label">Availability</label>
        <div class="filter-options">
          <label class="filter-check"><input type="checkbox" id="inStockOnly"/> In Stock Only</label>
        </div>
      </div>

      <button class="btn btn-primary w-full" id="applyFilters">Apply Filters</button>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="products-main">
      <div class="products-toolbar">
        <span id="productCount">0 products found</span>
        <div class="toolbar-right">
          <select id="sortSelect">
            <option value="default">Sort: Default</option>
            <option value="price-asc">Price: Low to High</option>
            <option value="price-desc">Price: High to Low</option>
            <option value="rating">Top Rated</option>
            <option value="newest">Newest</option>
          </select>
          <button class="view-btn active" id="gridView"><i class="fas fa-th"></i></button>
          <button class="view-btn" id="listView"><i class="fas fa-list"></i></button>
        </div>
      </div>

      <!-- ACTIVE FILTERS -->
      <div class="active-filters" id="activeFilters"></div>

      <!-- SKELETON / PRODUCTS -->
      <div class="products-grid" id="productsGrid">
        <!-- JS injected -->
      </div>

      <!-- PAGINATION -->
      <div class="pagination" id="pagination"></div>
    </main>
  </div>

  <!-- MOBILE FILTER TOGGLE -->
  <button class="fab-filter" id="fabFilter">
    <i class="fas fa-sliders-h"></i> Filters
  </button>

  <div id="toastContainer" class="toast-container"></div>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; <script>document.write(new Date().getFullYear())</script> RUET Online Shop. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="js/core/db.js"></script>
  <script src="js/core/seed.js"></script>
  <script src="js/core/auth.js"></script>
  <script src="js/core/utils.js"></script>
  <script src="js/ui/theme.js"></script>
  <script src="js/ui/toast.js"></script>
  <script src="js/ui/navbar.js"></script>
  <script src="js/features/ratings.js"></script>
  <script src="js/features/products.js"></script>
  <script src="js/features/cart.js"></script>
  <script src="js/features/wishlist.js"></script>
  <script src="js/pages/products-page.js"></script>
</body>
</html>
